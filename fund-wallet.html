}

/* This targets the dark navy text sections */

<body class="text-[#081B4B] antialiased">

            <div class="flex items-center gap-3 mb-10">
                <div class="w-10 h-10 bg-[#0052FF] rounded-xl flex items-center justify-center text-white shadow-lg"><i data-lucide="zap" class="w-6 h-6 fill-current"></i></div>
                <h1 class="text-lg font-extrabold tracking-tight text-[#081B4B]">Elite Data</h1>
            </div>
            <nav class="flex-1 space-y-1 font-bold text-[13px]">
                <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-2xl text-slate-400"><i data-lucide="layout-grid" class="w-4 h-4"></i> Dashboard</a>
                <a href="buy-data.html" class="flex items-center gap-3 px-4 py-3 rounded-2xl text-slate-400"><i data-lucide="wifi" class="w-4 h-4"></i> Buy Data</a>
                <a href="buy-airtime.html" class="active-nav flex items-center gap-3 px-4 py-3 rounded-2xl"><i data-lucide="smartphone" class="w-4 h-4"></i> Airtime Top-up</a>

        <main class="flex-1 flex flex-col min-w-0">
            <header class="lg:hidden bg-white px-6 py-4 flex justify-between items-center border-b border-slate-50 sticky top-0 z-[60]">

                <i data-lucide="bell" class="w-6 h-6 text-slate-400"></i>
                <button onclick="toggleTheme()" class="w-10 h-10 flex items-center justify-center bg-slate-50 dark:bg-slate-800 rounded-xl transition-all">
    <i data-lucide="moon" class="w-5 h-5 text-slate-400 dark:hidden"></i>
    <i data-lucide="sun" class="hidden dark:block w-5 h-5 text-yellow-400"></i>
</button>
            </header>

            <div class="w-full pb-32">
                <div class="lg:hidden bg-[#0052FF] p-6 pb-24 text-white flex justify-between items-start rounded-b-[40px]">
                    <div><p class="text-blue-100 text-[10px] font-bold uppercase tracking-widest mb-1">Add Funds,</p><h2 class="text-xl font-bold">Refill Wallet 💳</h2></div>
                </div>

                <div class="max-w-4xl mx-auto px-6">
                    <div class="lg:hidden relative z-20 bg-white p-8 rounded-[32px] -mt-16 shadow-2xl flex flex-col items-center border border-slate-50">
                        <p class="text-slate-400 text-[10px] font-bold uppercase mb-2 tracking-widest">Current Balance</p>
                        <h3 class="text-3xl font-black">₦<span id="user-balance-mobile">0.00</span></h3>
                    </div>

                    <div class="space-y-10 mt-10">
                        <section>
                            <h4 class="font-extrabold text-sm mb-4 uppercase tracking-wider text-slate-400 text-center lg:text-left">1. Enter Amount</h4>
                            <div class="relative max-w-md mx-auto lg:mx-0">
                                <span class="absolute left-5 top-1/2 -translate-y-1/2 font-black text-slate-300 text-xl">₦</span>
                                <input type="number" id="fundAmount" class="w-full pl-12 pr-4 py-5 bg-white border border-slate-200 rounded-[24px] outline-none focus:border-[#0052FF] font-bold text-xl shadow-sm" placeholder="0.00">
                            </div>
                        </section>

                        <div class="max-w-md mx-auto lg:mx-0">
                            <button type="button" onclick="payWithFlutterwave()" id="payBtn" class="w-full bg-[#0052FF] text-white py-5 rounded-2xl font-black text-lg shadow-blue-200 hover:bg-blue-700 transition-all active:scale-95">
                                Pay Now
                            </button>
                        </div>
                    </div>

    <script src="theme.js"></script> <!-- Add this before your other scripts -->
<script src="supabase-config.js"></script>
<script src="notifications.js"></script>
    <script>
        lucide.createIcons();
        let userId = "";
        let userEmail = "";

        async function loadData() {
            // Check session
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) { window.location.href = "login.html"; return; }
            
            userId = session.user.id;
            userEmail = session.user.email;

            // Fetch balance
            const { data: wallet } = await _supabase.from('wallets').select('balance').eq('id', userId).single();
            if (wallet) {
                document.getElementById('user-balance-mobile').innerText = parseFloat(wallet.balance).toLocaleString();
            }
        }

        function payWithFlutterwave() {
            const amount = document.getElementById('fundAmount').value;
            if (!amount || amount < 1000) return showToast("Minimum funding amount is ₦1000", "error");
            const btn = document.getElementById('payBtn');
            btn.innerText = "Connecting...";
            btn.disabled = true;

            FlutterwaveCheckout({
                public_key: "FLWPUBK_TEST-863a168da59d63988d02db3541514a36-X", // <--- ENSURE THIS IS YOUR ACTUAL KEY
                tx_ref: "ELITE-" + Date.now(),
                amount: amount,
                currency: "NGN",
                customer: { email: userEmail, name: "Elite User" },
                callback: async function(payment) {
                    console.log("Flutterwave Callback Data:", payment);
                    
                    // Match the 'completed' status found in your logs
                    if (payment.status === "completed" || payment.status === "successful") {
                        const { error } = await _supabase.rpc('fund_wallet_v2', {
                            uid: userId,
                            amt: parseFloat(amount)
                        });

                        if (error) {
                            showToast("Payment received, but database update failed.", "error");
                            btn.disabled = false;
                            btn.innerText = "Pay Now";
                        } else {
                            showToast("₦" + amount + " has been added to your wallet!");
                            setTimeout(() => { window.location.href = "dashboard.html"; }, 2000);
                        }
                    }
                },
                onclose: function() {
                    btn.innerText = "Pay Now";
                    btn.disabled = false;
                }
            });
        }

        // Hamburger Menu Logic
        function toggleMenu() {
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('overlay');
            sb.classList.toggle('-translate-x-full');
            ov.classList.toggle('hidden');
        }

        window.onload = loadData;
    </script>
</body>
