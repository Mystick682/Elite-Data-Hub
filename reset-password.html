<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password | Elite Data Services</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#F8FAFF] text-[#081B4B] antialiased flex items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-[440px] bg-white p-10 rounded-[32px] shadow-2xl border border-slate-50">
        <div class="text-center mb-10">
            <h2 class="text-2xl font-black mb-2">Create New Password</h2>
            <p class="text-slate-400 text-sm">Enter your new secure password below</p>
        </div>

        <form id="resetForm" class="space-y-6">
            <div class="space-y-2">
                <label class="text-[11px] font-bold text-slate-500 uppercase tracking-widest ml-1">New Password</label>
                <input type="password" id="newPassword" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-[#0052FF] font-medium" placeholder="Min 6 characters">
            </div>
            <button type="submit" id="saveBtn" class="w-full bg-[#0052FF] text-white py-4.5 rounded-2xl font-black shadow-xl shadow-blue-100 hover:bg-blue-700 transition-all active:scale-95">Update Password</button>
        </form>
    </div>

    <script src="supabase-config.js"></script>
    <script src="notifications.js"></script>
    <script>
        lucide.createIcons();
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            const newPass = document.getElementById('newPassword').value;

            if(newPass.length < 6) return showToast("Password too short", "error");

            btn.innerText = "Updating...";
            const { error } = await _supabase.auth.updateUser({ password: newPass });

            if (error) {
                showToast(error.message, "error");
                btn.innerText = "Update Password";
            } else {
                showToast("Password updated! Please login.");
                setTimeout(() => window.location.href = "login.html", 2000);
            }
        });
    </script>
</body>
</html>
