<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Transfer | Elite Data Services</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFF; margin: 0; padding: 0; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-nav { background: #0052FF !important; color: white !important; }
    </style>
</head>
<body class="text-[#081B4B] antialiased text-sm">

    <!-- PIN MODAL -->
    <div id="pinModal" class="fixed inset-0 z-[100] flex items-center justify-center p-6 hidden">
        <div class="fixed inset-0 bg-[#081B4B]/60 backdrop-blur-sm"></div>
        <div class="bg-white rounded-[32px] p-8 relative z-10 shadow-2xl border border-slate-100 text-center max-w-sm w-full">
            <i data-lucide="lock" class="w-12 h-12 text-[#0052FF] mx-auto mb-4"></i>
            <h3 class="text-xl font-black mb-6">Enter PIN</h3>
            <div class="flex justify-center gap-3 mb-8">
                <input type="password" maxlength="1" class="pin-box w-12 h-14 bg-slate-50 border border-slate-200 rounded-xl text-center text-xl font-black focus:border-[#0052FF] outline-none">
                <input type="password" maxlength="1" class="pin-box w-12 h-14 bg-slate-50 border border-slate-200 rounded-xl text-center text-xl font-black focus:border-[#0052FF] outline-none">
                <input type="password" maxlength="1" class="pin-box w-12 h-14 bg-slate-50 border border-slate-200 rounded-xl text-center text-xl font-black focus:border-[#0052FF] outline-none">
                <input type="password" maxlength="1" class="pin-box w-12 h-14 bg-slate-50 border border-slate-200 rounded-xl text-center text-xl font-black focus:border-[#0052FF] outline-none">
            </div>
            <button onclick="executeFinalTransfer()" id="confirmPinBtn" class="w-full bg-[#0052FF] text-white py-4 rounded-2xl font-black shadow-xl active:scale-95 transition-all uppercase text-xs">Verify & Send</button>
            <button onclick="document.getElementById('pinModal').classList.add('hidden')" class="w-full py-3 text-slate-400 font-bold text-[10px] mt-2 uppercase">Cancel</button>
        </div>
    </div>

    <div class="flex min-h-screen">
        <!-- SIDEBAR -->
        <aside class="hidden lg:flex w-72 bg-white border-r border-slate-100 flex-col sticky top-0 h-screen p-6">
            <h1 class="text-lg font-black mb-10 text-[#0052FF]">Elite Data</h1>
            <nav class="flex-1 space-y-1 font-bold text-[13px]">
                <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-2xl text-slate-400 hover:bg-slate-50 transition-all"><i data-lucide="layout-grid" class="w-4 h-4"></i> Dashboard</a>
                <a href="withdraw-bank.html" class="active-nav flex items-center gap-3 px-4 py-3 rounded-2xl"><i data-lucide="send" class="w-4 h-4"></i> Bank Transfer</a>
            </nav>
        </aside>

        <main class="flex-1 flex flex-col min-w-0 bg-[#F8FAFF]">
            <header class="lg:hidden bg-white px-6 py-4 flex justify-between items-center border-b border-slate-50 sticky top-0 z-[60]">
                <span class="font-extrabold text-[#0052FF]">Elite Bank Transfer</span>
                <i data-lucide="bell" class="w-6 h-6 text-slate-400"></i>
            </header>

            <div class="p-6 lg:p-10 max-w-2xl mx-auto w-full pb-32">
                <div class="bg-white p-8 lg:p-10 rounded-[40px] shadow-2xl border border-slate-100">
                    <h2 class="text-2xl font-black mb-1">Transfer to Bank</h2>
                    <p class="text-slate-400 text-xs mb-10 uppercase tracking-widest font-bold">Fast & Secure Payouts</p>
                    
                    <form class="space-y-6">
                        <div>
                            <label class="text-[10px] font-black uppercase text-slate-400 tracking-widest ml-1">1. Select Bank</label>
                            <select id="bankList" class="w-full p-4 mt-1 bg-slate-50 border border-slate-100 rounded-2xl font-bold outline-none focus:border-[#0052FF]">
                                <option value="">Choose Bank...</option>
                                <option value="999992">OPay Digital Services</option>
                                <option value="999991">PalmPay</option>
                                <option value="058">GTBank</option>
                                <option value="011">First Bank</option>
                                <option value="033">UBA</option>
                                <option value="044">Access Bank</option>
                                <option value="070">Fidelity Bank</option>
                                <option value="050">Ecobank</option>
                            </select>
                        </div>

                        <div>
                            <label class="text-[10px] font-black uppercase text-slate-400 tracking-widest ml-1">2. Account Number</label>
                            <input type="number" id="accountNumber" oninput="verifyReceiver()" class="w-full p-4 mt-1 bg-slate-50 border border-slate-100 rounded-2xl font-bold outline-none focus:border-[#0052FF]" placeholder="0123456789">
                            <p id="accountNameDisplay" class="text-[11px] font-black text-[#0052FF] mt-2 ml-1 italic"></p>
                        </div>

                        <div>
                            <label class="text-[10px] font-black uppercase text-slate-400 tracking-widest ml-1">3. Amount (₦)</label>
                            <input type="number" id="transferAmount" class="w-full p-4 mt-1 bg-slate-50 border border-slate-100 rounded-2xl font-black text-xl outline-none focus:border-[#0052FF]" placeholder="0.00">
                        </div>

                        <button type="button" onclick="openModal()" id="mainBtn" class="w-full bg-[#0052FF] text-white py-5 rounded-2xl font-black shadow-xl active:scale-95 transition-all mt-4">
                            Proceed to Transfer
                        </button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="supabase-config.js"></script>
    <script src="notifications.js"></script>
    <script>
        lucide.createIcons();
        let userId = "";
        let verifiedName = "";

        // PIN behavior
        const pinInputs = document.querySelectorAll('.pin-box');
        pinInputs.forEach((input, index) => {
            input.addEventListener('keyup', (e) => {
                if (e.target.value.length === 1 && index < 3) pinInputs[index + 1].focus();
                if (e.key === 'Backspace' && index > 0) pinInputs[index - 1].focus();
            });
        });

        async function init() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) { window.location.href = "login.html"; return; }
            userId = session.user.id;
        }

        async function verifyReceiver() {
            const bank = document.getElementById('bankList').value;
            const account = document.getElementById('accountNumber').value;
            const display = document.getElementById('accountNameDisplay');

            if (bank && account.length === 10) {
                display.innerText = "🔍 Verifying Account...";
                // Call Paystack Resolve API (We can do this via public fetch)
                // FOR TESTING: Replace 'YOUR_PUBLIC_KEY' with your Paystack Public Key
                fetch(`https://api.paystack.co/bank/resolve?account_number=${account}&bank_code=${bank}`, {
                    headers: { 'Authorization': 'Bearer pk_test_17c0f997be5b20fcca58572cd2c07ce7383dee99' } 
                })
                .then(r => r.json())
                .then(data => {
                    if(data.status) {
                        verifiedName = data.data.account_name;
                        display.innerText = "RECEIVER: " + verifiedName;
                    } else {
                        display.innerText = "❌ Invalid Account";
                        verifiedName = "";
                    }
                });
            }
        }

        function openModal() {
            if (!verifiedName) return showToast("Verify account details first", "error");
            const amt = document.getElementById('transferAmount').value;
            if (amt < 500) return showToast("Min transfer is ₦500", "error");
            document.getElementById('pinModal').classList.remove('hidden');
            pinInputs[0].focus();
        }

        async function executeFinalTransfer() {
            let pin = ""; pinInputs.forEach(i => pin += i.value);
            const amt = document.getElementById('transferAmount').value;
            const bankCode = document.getElementById('bankList').value;
            const accNum = document.getElementById('accountNumber').value;
            const btn = document.getElementById('confirmPinBtn');

            btn.innerText = "Processing..."; btn.disabled = true;

            try {
                // 1. Verify and Deduct from Wallet
                const { data: res } = await _supabase.rpc('process_purchase_secure', {
                    uid: userId, amt: parseFloat(amt), p_type: 'Bank Transfer',
                    p_desc: `Sent to ${verifiedName}`, input_pin: pin
                });

                if (res === 'success') {
                    // 2. Call the Payout Edge Function
                    const { data: payout, error: fErr } = await _supabase.functions.invoke('payout', {
                        body: { bankCode, accountNumber: accNum, amount: amt, userId }
                    });

                    if (fErr || !payout.status) {
                        // Refund if it fails
                        await _supabase.rpc('fund_wallet_v2', { uid: userId, amt: parseFloat(amt) });
                        showToast("Payout failed. Money refunded.", "error");
                    } else {
                        showToast("✅ Money sent successfully!", "success");
                        setTimeout(() => window.location.href = "dashboard.html", 2000);
                    }
                } else {
                    showToast(res.replace('_', ' '), "error");
                }
            } catch (err) { showToast("System Error", "error"); }
            finally { btn.innerText = "Confirm Transfer"; btn.disabled = false; }
        }

        window.onload = init;
    </script>
</body>
</html>
